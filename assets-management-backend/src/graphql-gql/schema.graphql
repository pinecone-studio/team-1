# ─── Disposal workflow ─────────────────────────────────────────────────────

type DisposalRequest {
  id: ID!
  assetId: ID!
  asset: Asset
  requestedBy: Employee
  method: String!
  reason: String
  status: String!
  itApprovedBy: Employee
  itApprovedAt: Float
  financeApprovedBy: Employee
  financeApprovedAt: Float
  dataWipeCertKey: String
  rejectedBy: Employee
  rejectedAt: Float
  rejectionReason: String
  createdAt: Float!
  updatedAt: Float!
}

# ─── Offboarding workflow ───────────────────────────────────────────────────

type DataWipeTask {
  id: ID!
  assetId: ID!
  asset: Asset
  latestAssignment: Assignment
  latestReturnRequest: OffboardingReturnRequest
  status: String!
  createdAt: Float!
  updatedAt: Float!
}

type OffboardingReturnRequest {
  id: ID!
  offboardingEventId: ID!
  assetId: ID!
  assignmentId: ID!
  employeeId: ID!
  conditionEmployee: String!
  status: String!
  conditionHr: String
  photoR2Key: String
  inspectedBy: ID
  createdAt: Float!
  updatedAt: Float!
  asset: Asset
  employee: Employee
}

type OffboardingEvent {
  id: ID!
  employee: Employee
  initiatedBy: Employee
  status: String!
  totalAssets: Int!
  returnedAssets: Int!
  assetIdsJson: String!
  """
  assetIdsJson-д хадгалсан ID-аар assets хүснэгтээс шүүж авсан буцаах хөрөнгийн жагсаалт
  """
  assetsToReturn: [Asset!]!
  """
  HR шалгах хүлээгдэж буй буцаах хүсэлтүүд (status=PENDING_HR)
  """
  pendingReturnRequests: [OffboardingReturnRequest!]!
  deadline: Float
  completedAt: Float
  createdAt: Float!
  updatedAt: Float!
}

type Notification {
  id: ID!
  employeeId: ID
  role: String
  title: String!
  message: String!
  type: String!
  link: String
  isRead: Int!
  createdAt: Float!
}

enum UserRole {
  SUPER_ADMIN
  IT_ADMIN
  EMPLOYEE
  FINANCE
}

type ITDashboardView {
  recentAssets: [Asset!]!
  openTickets: [MaintenanceTicket!]!
  pendingTransfers: [Transfer!]!
  notifications: [Notification!]!
}

type EmployeeDashboardView {
  myAssets: [Asset!]!
  myAssignments: [Assignment!]!
  notifications: [Notification!]!
}

type FinanceDashboardView {
  pendingPurchaseRequests: [PurchaseRequest!]!
  recentOrders: [PurchaseOrder!]!
  pendingDisposals: [DisposalRequest!]!
  notifications: [Notification!]!
}

type DashboardSearchResult {
  itView: ITDashboardView
  employeeView: EmployeeDashboardView
  financeView: FinanceDashboardView
}

type AuditLog {
  id: ID!
  tableName: String!
  recordId: String!
  action: String!
  oldValueJson: String
  newValueJson: String
  actorId: ID!
  createdAt: Float!
}

type AssetKpis {
  totalCount: Int!
  totalValue: Float!
  assignedCount: Int!
  assignedValue: Float!
  unassignedCount: Int!
  unassignedValue: Float!
  forSaleCount: Int!
  forSaleValue: Float!
  brokenCount: Int!
  brokenValue: Float!
}

type Query {
  employees: [Employee!]!
  employee(id: ID!): Employee
  assets(
    office: String
    categoryIds: [ID!]
    subCategoryIds: [ID!]
    locationIds: [ID!]
    limit: Int
    offset: Int
  ): [Asset!]!
  asset(id: ID!): Asset
  assetKpis(office: String): AssetKpis!
  assignments: [Assignment!]!
  employeeAssignments(employeeId: ID!, status: String): [Assignment!]!
  purchaseRequests(status: PurchaseRequestStatus): [PurchaseRequest!]!
  purchaseRequest(id: ID!): PurchaseRequest
  categories: [Category!]!
  assetHistory(assetId: ID!): [AssetTimelineEvent!]!
  disposalRequest(id: ID!): DisposalRequest
  disposalRequests(status: String): [DisposalRequest!]!
  offboardingEvent(employeeId: ID!): OffboardingEvent
  """
  Нэг offboarding event-ийн PENDING_HR буцаах хүсэлтүүд (HR bell-д)
  """
  pendingReturnRequests(offboardingEventId: ID!): [OffboardingReturnRequest!]!
  searchAssets(
    filter: AssetSearchInput!
    pagination: PaginationInput
    sort: AssetSortInput
  ): AssetSearchResult!
  dashboard(role: UserRole!, employeeId: ID): DashboardSearchResult!

  # ── Central Command Visibility ───────────────────────────────────
  vendors: [Vendor!]!
  locations: [Location!]!
  auditLogs(tableName: String, recordId: String): [AuditLog!]!
  maintenanceTickets(status: String): [MaintenanceTicket!]!
  dataWipeTasks(status: String): [DataWipeTask!]!
}

type Vendor {
  id: ID!
  name: String!
  contactName: String
  email: String
  phone: String
  address: String
  createdAt: Float!
}

type Location {
  id: ID!
  name: String!
  parentId: ID
  type: String!
  createdAt: Float!
}

type Transfer {
  id: ID!
  assetId: ID!
  fromEmployeeId: ID!
  toEmployeeId: ID!
  reason: String
  approvedBy: ID
  transferredAt: Float!
  conditionNoted: String
  createdAt: Float!
}

type MaintenanceTicket {
  id: ID!
  assetId: ID!
  reporterId: ID!
  description: String!
  severity: String!
  status: String!
  vendorId: ID
  repairCost: Float
  resolvedAt: Float
  createdAt: Float!
  updatedAt: Float!
}

type PurchaseOrder {
  id: ID!
  vendorId: ID!
  requestedBy: ID!
  approvedBy: ID
  lineItemsJson: String!
  totalCost: Float!
  status: String!
  deliveredAt: Float
  createdAt: Float!
  updatedAt: Float!
}

input VendorInput {
  name: String!
  contactName: String
  email: String
  phone: String
  address: String
}

input LocationInput {
  name: String!
  parentId: ID
  type: String!
}

input NotificationInput {
  employeeId: ID
  role: UserRole
  title: String!
  message: String!
  type: String
  link: String
}

type Mutation {
  createEmployee(input: EmployeeCreateInput!): Employee!
  updateEmployee(id: ID!, input: EmployeeUpdateInput!): Employee
  deleteEmployee(id: ID!): Boolean!
  createAsset(input: AssetCreateInput!): Asset!
  updateAsset(id: ID!, input: AssetUpdateInput!): Asset
  deleteAsset(id: ID!): Boolean!
  assignAsset(
    assetId: ID!
    employeeId: ID!
    conditionAtAssign: String
    accessoriesJson: String
    buyoutPolicyId: ID
    assignedValue: Float
    paymentPlanMonths: Int
    interestRate: Float
    requestedByEmployeeId: ID
  ): Asset
  updateAssetCategory(assetId: ID!, categoryId: ID!): Asset
  returnAsset(assetId: ID!, conditionAtReturn: String): Asset
  createPurchaseRequest(
    assetTag: String!
    category: String!
    serialNumber: String!
    purchaseCost: Int
    purchaseDate: Float
    requesterEmployeeId: ID!
    requesterEmail: String!
  ): PurchaseRequest!
  createPurchaseRequestBatch(
    items: [PurchaseRequestItemInput!]!
    requesterEmployeeId: ID!
    requesterEmail: String!
  ): [PurchaseRequest!]!
  approvePurchaseRequest(
    token: String!
    approverEmail: String!
  ): PurchaseRequest!
  declinePurchaseRequest(
    token: String!
    approverEmail: String!
  ): PurchaseRequest!

  # ── Disposal mutations ───────────────────────────────────────────────
  requestDisposal(
    assetId: ID!
    requestedBy: ID!
    method: String!
    reason: String
  ): DisposalRequest!
  approveDisposal(id: ID!, approvedBy: ID!, stage: String!): DisposalRequest!
  rejectDisposal(id: ID!, rejectedBy: ID!, reason: String): DisposalRequest!
  uploadDataWipeCertificate(
    id: ID!
    fileKey: String!
    uploadedBy: ID!
  ): DisposalRequest!
  completeDisposal(
    id: ID!
    certifiedBy: ID!
    writeOffValue: Int
    recipient: String
  ): DisposalRequest!

  # ── Offboarding mutations ────────────────────────────────────────────
  startOffboarding(
    employeeId: ID!
    initiatedBy: ID!
    terminationDate: Float
  ): OffboardingEvent!
  """
  Ажилтан буцаах хүсэлт илгээх (HR шалгах хүртэл PENDING_HR). Нөхцөлийн дэлгэрэнгүй, эвдрэлтэй үед зураг (R2 key) заавал биш.
  """
  submitReturnRequest(
    assetId: ID!
    employeeId: ID!
    condition: String!
    conditionDetail: String
    photoR2Key: String
  ): OffboardingReturnRequest!
  """
  HR: нөхцөл зөв бол AVAILABLE болгоод IT data wipe task үүсгэнэ
  """
  approveReturnRequest(
    returnRequestId: ID!
    conditionHr: String!
    inspectedBy: ID!
  ): Asset!
  """
  HR: эвдрэлтэй бол зураг (R2) + засварын хүсэлт IT руу, asset REPAIR_REQUESTED
  """
  requestRepair(
    returnRequestId: ID!
    conditionHr: String!
    photoR2Key: String
    inspectedBy: ID!
  ): Asset!
  completeAssetReturn(
    assetId: ID!
    employeeId: ID!
    condition: String!
    inspectedBy: ID!
  ): Asset!
  createDataWipeTask(assetId: ID!): DataWipeTask!
  updateDataWipeTask(id: ID!, status: String!): DataWipeTask!

  # ── Maintenance mutations ───────────────────────────────────────────
  createMaintenanceTicket(
    assetId: ID!
    reporterId: ID!
    description: String!
    severity: String!
    vendorId: ID
    repairCost: Int
  ): MaintenanceTicket!
  updateMaintenanceTicket(
    id: ID!
    status: String!
    repairCost: Int
    resolvedAt: Float
  ): MaintenanceTicket!

  # ── Asset Management overrides ─────────────────────────────────────
  transferAsset(
    assetId: ID!
    fromEmployeeId: ID!
    toEmployeeId: ID!
    reason: String
    conditionNoted: String
  ): Transfer!
  updateAssignmentStatus(assignmentId: ID!, status: String!): Assignment

  # ── Super Admin Central Command ──────────────────────────────────────
  createVendor(input: VendorInput!): Vendor!

  updateVendor(id: ID!, input: VendorInput!): Vendor
  deleteVendor(id: ID!): Boolean!

  createLocation(input: LocationInput!): Location!
  updateLocation(id: ID!, input: LocationInput!): Location
  deleteLocation(id: ID!): Boolean!

  createCategory(name: String!, parentId: ID): Category!
  updateCategory(id: ID!, name: String, parentId: ID): Category
  deleteCategory(id: ID!): Boolean!

  sendNotification(input: NotificationInput!): Notification!
  markNotificationAsRead(id: ID!): Boolean!

  adminOverrideDisposal(id: ID!, status: String!): DisposalRequest!
  adminOverridePurchase(token: String!, status: String!): [PurchaseRequest!]!
  adminOverrideOffboarding(id: ID!, status: String!): OffboardingEvent!
}
