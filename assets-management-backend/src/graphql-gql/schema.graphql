  purchaseCost: Float
  purchaseDate: Float
  requesterEmployeeId: ID!
  requesterEmail: String!
  status: PurchaseRequestStatus!
  decidedAt: Float
  decidedBy: String
  createdAt: Float!
  updatedAt: Float!
}

