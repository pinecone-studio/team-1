type AssetTimelineEvent {
  id: ID!
  eventType: String!
  description: String!
  actor: Employee
  timestamp: String!
}

type Employee {
  id: ID!
  entraId: String
  clerkId: String
  firstName: String!
  lastName: String!
  firstNameEng: String!
  lastNameEng: String!
  email: String!
  role: String!
  imageUrl: String
  hireDate: Float!
  terminationDate: Float
  status: String!
  numberOfVacationDays: Int
  github: String
  department: String!
  branch: String!
  employeeCode: String!
  level: String!
  isKpi: Int!
  isSalaryCompany: Int!
  birthDayAndMonth: String
  birthdayPoster: String
  createdAt: Float!
  updatedAt: Float!
  deletedAt: Float
}

type Asset {
  id: ID!
  assetTag: String!
  category: String!
  serialNumber: String!
  status: String!
  purchaseDate: Float
  purchaseCost: Float
  currentBookValue: Float
  locationId: String
  locationPath: String
  assignedTo: String
  imageUrl: String
  notes: String
  createdAt: Float!
  updatedAt: Float!
  deletedAt: Float
}

type Category {
  id: ID!
  name: String!
  parentId: ID
  subcategories: [Category!]!
}

type Assignment {
  id: ID!
  assetId: ID!
  employeeId: ID!
  assignedAt: Float!
  returnedAt: Float
  conditionAtAssign: String!
  conditionAtReturn: String
  status: String!
  employee: Employee
  asset: Asset
  buyoutPolicy: AssignmentBuyoutPolicy
  financing: AssignmentFinancing
  """
  Хүлээгдэж буй шилжүүлэлтийг хэн илгээсэн (ASSIGN_REQUESTED үед)
  """
  requestedBy: Employee
}

type AssignmentBuyoutPolicy {
  id: ID!
  name: String!
  minEmploymentMonths: Int!
  paymentPercent: Float!
  isFree: Int!
  category: Category
  createdAt: Float!
}

type AssignmentFinancing {
  id: ID!
  assignmentId: ID!
  assignedValue: Float
  paymentPlanMonths: Int
  interestRate: Float
  monthlyPayment: Float
  totalPayment: Float
  payments: [AssignmentPayment!]!
  createdAt: Float!
  updatedAt: Float!
}

type AssignmentPayment {
  id: ID!
  financingId: ID!
  amount: Int!
  dueDate: Float!
  paidAt: Float
  status: String!
  createdAt: Float!
}

input AssetCreateInput {
  assetTag: String!
  category: String!
  mainCategory: String
  serialNumber: String!
  status: String
  purchaseDate: Float
  purchaseCost: Float
  currentBookValue: Float
  locationId: String
  assignedTo: String
  imageUrl: String
  notes: String
  deletedAt: Float
}

input AssetUpdateInput {
  assetTag: String
  category: String
  mainCategory: String
  serialNumber: String
  status: String
  purchaseDate: Float
  purchaseCost: Float
  currentBookValue: Float
  locationId: String
  assignedTo: String
  imageUrl: String
  notes: String
  deletedAt: Float
}

enum PurchaseRequestStatus {
  PENDING
  APPROVED
  DECLINED
}

enum AssignmentStatus {
  PENDING
  ACTIVE
  RETURNED
  CANCELLED
}

enum AssetStatus {
  AVAILABLE
  ASSIGNED
  IN_MAINTENANCE
  RETURNING
  RETURNED
  REPAIR_REQUESTED
  IN_REPAIR
  DISPOSAL_REQUESTED
  DISPOSED
}

enum SortDirection {
  ASC
  DESC
}

enum AssetSortField {
  createdAt
  purchaseDate
  assetTag
}

input AssetSearchInput {
  status: AssetStatus
  categoryId: ID
  locationId: ID
  employeeId: ID
  searchText: String
  startDate: Float
  endDate: Float
}

input PaginationInput {
  limit: Int
  offset: Int
}

input AssetSortInput {
  field: AssetSortField!
  direction: SortDirection!
}

type AssetSearchResult {
  total: Int!
  items: [Asset!]!
}

input PurchaseRequestItemInput {
  assetTag: String!
  category: String!
  serialNumber: String!
  purchaseCost: Float
  purchaseDate: Float
}

type PurchaseRequest {
