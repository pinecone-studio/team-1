query GetEmployeeAssignments($employeeId: ID!) {
  employeeAssignments(employeeId: $employeeId) { # Нэрийг нь Backend-тэйгээ ижил болгов
    id
    assetId
    employeeId
    assignedAt
    returnedAt
    conditionAtAssign
    conditionAtReturn
    status
    financing {
      assignedValue
      paymentPlanMonths
      interestRate
      monthlyPayment
      totalPayment
    }
    asset {
      id
      assetTag
      serialNumber
      imageUrl
    }
    employee {
      id
      email
      firstName
      lastName
    }
  }
}