query Assets($office: String, $categoryIds: [ID!], $subCategoryIds: [ID!]) {
  assets(office: $office, categoryIds: $categoryIds, subCategoryIds: $subCategoryIds) {
    id
    assetTag
    category
    serialNumber
    status
    purchaseDate
    purchaseCost
    currentBookValue
    locationId
    assignedTo
    imageUrl
    createdAt
    updatedAt
    deletedAt
  }
}

query Asset($id: ID!) {
  asset(id: $id) {
    id
    assetTag
    category
    serialNumber
    status
    purchaseDate
    purchaseCost
    currentBookValue
    locationId
    assignedTo
    imageUrl
    createdAt
    updatedAt
    deletedAt
  }
}

mutation CreateAsset($input: AssetCreateInput!) {
  createAsset(input: $input) {
    id
    assetTag
    category
    serialNumber
    status
    purchaseDate
    purchaseCost
    currentBookValue
    locationId
    assignedTo
    imageUrl
    createdAt
    updatedAt
    deletedAt
  }
}

mutation UpdateAsset($id: ID!, $input: AssetUpdateInput!) {
  updateAsset(id: $id, input: $input) {
    id
    assetTag
    category
    serialNumber
    status
    purchaseDate
    purchaseCost
    currentBookValue
    locationId
    assignedTo
    imageUrl
    createdAt
    updatedAt
    deletedAt
  }
}

mutation DeleteAsset($id: ID!) {
  deleteAsset(id: $id)
}

mutation AssignAsset(
  $assetId: ID!
  $employeeId: ID!
  $conditionAtAssign: String
  $accessoriesJson: String
) {
  assignAsset(
    assetId: $assetId
    employeeId: $employeeId
    conditionAtAssign: $conditionAtAssign
    accessoriesJson: $accessoriesJson
  ) {
    id
    assetTag
    category
    serialNumber
    status
    purchaseDate
    purchaseCost
    currentBookValue
    locationId
    assignedTo
    imageUrl
    createdAt
    updatedAt
    deletedAt
  }
}

mutation ReturnAsset($assetId: ID!, $conditionAtReturn: String) {
  returnAsset(assetId: $assetId, conditionAtReturn: $conditionAtReturn) {
    id
    assetTag
    category
    serialNumber
    status
    purchaseDate
    purchaseCost
    currentBookValue
    locationId
    assignedTo
    imageUrl
    createdAt
    updatedAt
    deletedAt
  }
}
