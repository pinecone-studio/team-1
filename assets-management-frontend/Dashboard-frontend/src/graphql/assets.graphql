# GraphQL Operations Index
# 
# This file serves as documentation for organized GraphQL operations.
# All operations are now separated into focused domain files:
#
# Fragments (shared data shapes):
#   fragments.graphql - AssetFields, EmployeeFields, CategoryFields, VendorFields, LocationFields
#
# Asset Operations:
#   assets-queries.graphql - GetAssets, GetAsset, SearchAssets, GetAssetHistory, GetEligibleCategoryUpdateAssets
#   assets-mutations.graphql - CreateAsset, UpdateAsset, DeleteAsset, UpdateAssetCategory
#
# Reference Data:
#   reference-queries.graphql - GetVendors, GetCategories, GetLocations
#
# Assignment & Transfer:
#   assignment-mutations.graphql - AssignAsset, ReturnAsset, TransferAsset
#
# Maintenance:
#   maintenance-mutations.graphql - CreateMaintenanceTicket
#
# Disposal Process:
#   disposal-operations.graphql - GetActiveDisposals, RequestDisposal, ApproveDisposal, RejectDisposal
#
# Employee Offboarding:
#   offboarding-queries.graphql - GetActiveOffboarding
#
# Note: GraphQL Codegen automatically processes all .graphql files in src/graphql/
# You can import any query/mutation/fragment from @/gql/graphql in your components.

