# Fragments
fragment AssetFields on Asset {
  id
  assetTag
  serialNumber
  status
  category
  purchaseDate
  purchaseCost
  currentBookValue
  locationId
  assignedTo
  imageUrl
  createdAt
  updatedAt
}

fragment EmployeeFields on Employee {
  id
  firstName
  lastName
  email
  role
  department
  branch
  imageUrl
}

fragment CategoryFields on Category {
  id
  name
  parentId
}

fragment VendorFields on Vendor {
  id
  name
  contactName
  email
  phone
  address
}

fragment LocationFields on Location {
  id
  name
  parentId
  type
}

# Queries
query SearchAssets($filter: AssetSearchInput!, $pagination: PaginationInput, $sort: AssetSortInput) {
  searchAssets(filter: $filter, pagination: $pagination, sort: $sort) {
    total
    items {
      ...AssetFields
    }
  }
}

query Assets($office: String, $categoryIds: [ID!], $subCategoryIds: [ID!]) {
  assets(office: $office, categoryIds: $categoryIds, subCategoryIds: $subCategoryIds) {
    ...AssetFields
  }
}

query GetAssetHistory($assetId: ID!) {
  assetHistory(assetId: $assetId) {
    id
    eventType
    description
    timestamp
    actor {
      ...EmployeeFields
    }
  }
}



query GetVendors {
  vendors {
    ...VendorFields
  }
}

query GetCategories {
  categories {
    ...CategoryFields
    subcategories {
      ...CategoryFields
    }
  }
}

query GetLocations {
  locations {
    ...LocationFields
  }
}

# Mutations
mutation AssignAsset($assetId: ID!, $employeeId: ID!, $conditionAtAssign: String) {
  assignAsset(assetId: $assetId, employeeId: $employeeId, conditionAtAssign: $conditionAtAssign) {
    ...AssetFields
  }
}

mutation TransferAsset($assetId: ID!, $fromEmployeeId: ID!, $toEmployeeId: ID!, $reason: String, $conditionNoted: String) {
  transferAsset(assetId: $assetId, fromEmployeeId: $fromEmployeeId, toEmployeeId: $toEmployeeId, reason: $reason, conditionNoted: $conditionNoted) {
    id
    assetId
    fromEmployeeId
    toEmployeeId
    reason
    transferredAt
  }
}

mutation UpdateAsset($id: ID!, $input: AssetUpdateInput!) {
  updateAsset(id: $id, input: $input) {
    ...AssetFields
  }
}

mutation CreateMaintenanceTicket($assetId: ID!, $reporterId: ID!, $description: String!, $severity: String!, $vendorId: ID, $repairCost: Int) {
  createMaintenanceTicket(assetId: $assetId, reporterId: $reporterId, description: $description, severity: $severity, vendorId: $vendorId, repairCost: $repairCost) {
    id
    assetId
    description
    status
    severity
  }
}

mutation RequestDisposal($assetId: ID!, $requestedBy: ID!, $method: String!, $reason: String) {
  requestDisposal(assetId: $assetId, requestedBy: $requestedBy, method: $method, reason: $reason) {
    id
    status
    assetId
  }
}

mutation ApproveDisposal($id: ID!, $approvedBy: ID!, $stage: String!) {
  approveDisposal(id: $id, approvedBy: $approvedBy, stage: $stage) {
    id
    status
  }
}

mutation RejectDisposal($id: ID!, $rejectedBy: ID!, $reason: String) {
  rejectDisposal(id: $id, rejectedBy: $rejectedBy, reason: $reason) {
    id
    status
  }
}
mutation CreateAsset($input: AssetCreateInput!) {
  createAsset(input: $input) {
    ...AssetFields
  }
}

mutation ReturnAsset($assetId: ID!, $conditionAtReturn: String) {
  returnAsset(assetId: $assetId, conditionAtReturn: $conditionAtReturn) {
    ...AssetFields
  }
}

mutation DeleteAsset($id: ID!) {
  deleteAsset(id: $id)
}
