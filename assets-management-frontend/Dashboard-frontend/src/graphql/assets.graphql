# Queries (fragments: see fragments.graphql)
query GetAssets($office: String, $categoryIds: [ID!], $subCategoryIds: [ID!], $locationIds: [ID!]) {
  assets(office: $office, categoryIds: $categoryIds, subCategoryIds: $subCategoryIds, locationIds: $locationIds) {
    ...AssetFields
  }
}

query GetAsset($id: ID!) {
  asset(id: $id) {
    ...AssetFields
  }
}

query SearchAssets($filter: AssetSearchInput!, $pagination: PaginationInput, $sort: AssetSortInput) {
  searchAssets(filter: $filter, pagination: $pagination, sort: $sort) {
    total
    items {
      ...AssetFields
    }
  }
}

query GetAssetHistory($assetId: ID!) {
  assetHistory(assetId: $assetId) {
    id
    eventType
    description
    timestamp
    actor {
      ...EmployeeFields
    }
  }
}

query GetVendors {
  vendors {
    ...VendorFields
  }
}

query GetCategories {
  categories {
    ...CategoryFields
    subcategories {
      ...CategoryFields
    }
  }
}

query GetLocations {
  locations {
    ...LocationFields
  }
}

query GetAssetKpis($office: String) {
  assetKpis(office: $office) {
    totalCount
    totalValue
    assignedCount
    assignedValue
    unassignedCount
    unassignedValue
    forSaleCount
    forSaleValue
    brokenCount
    brokenValue
  }
}

query GetActiveDisposals {
  disposalRequests(status: "PENDING") {
    id
    assetId
    method
    reason
    status
    createdAt
    asset {
      id
      assetTag
      category
    }
    requestedBy {
      id
      firstName
      lastName
      email
    }
  }
}

query GetDisposalRequests($status: String) {
  disposalRequests(status: $status) {
    id
    assetId
    method
    reason
    status
    createdAt
    asset {
      id
      assetTag
      category
    }
    requestedBy {
      id
      firstName
      lastName
      email
    }
  }
}

query GetActiveOffboarding($employeeId: ID!) {
  offboardingEvent(employeeId: $employeeId) {
    id
    status
    totalAssets
    returnedAssets
    assetIdsJson
    deadline
    completedAt
    createdAt
    assetsToReturn {
      id
      assetTag
      serialNumber
    }
    pendingReturnRequests {
      id
      assetId
      conditionEmployee
      status
      photoR2Key
      asset {
        id
        assetTag
        serialNumber
      }
    }
  }
}

query GetEligibleCategoryUpdateAssets {
  searchAssets(filter: { status: AVAILABLE }) {
    items {
      ...AssetFields
    }
  }
}

# Mutations
mutation CreateAsset($input: AssetCreateInput!) {
  createAsset(input: $input) {
    ...AssetFields
  }
}

mutation UpdateAsset($id: ID!, $input: AssetUpdateInput!) {
  updateAsset(id: $id, input: $input) {
    ...AssetFields
  }
}

mutation DeleteAsset($id: ID!) {
  deleteAsset(id: $id)
}

mutation AssignAsset(
  $assetId: ID!
  $employeeId: ID!
  $conditionAtAssign: String
  $accessoriesJson: String
  $buyoutPolicyId: ID
  $assignedValue: Float
  $paymentPlanMonths: Int
  $interestRate: Float
) {
  assignAsset(
    assetId: $assetId
    employeeId: $employeeId
    conditionAtAssign: $conditionAtAssign
    accessoriesJson: $accessoriesJson
    buyoutPolicyId: $buyoutPolicyId
    assignedValue: $assignedValue
    paymentPlanMonths: $paymentPlanMonths
    interestRate: $interestRate
  ) {
    ...AssetFields
  }
}

mutation ReturnAsset($assetId: ID!, $conditionAtReturn: String) {
  returnAsset(assetId: $assetId, conditionAtReturn: $conditionAtReturn) {
    ...AssetFields
  }
}

mutation UpdateAssetCategory($assetId: ID!, $categoryId: ID!) {
  updateAssetCategory(assetId: $assetId, categoryId: $categoryId) {
    ...AssetFields
  }
}

mutation TransferAsset($assetId: ID!, $fromEmployeeId: ID!, $toEmployeeId: ID!, $reason: String, $conditionNoted: String) {
  transferAsset(assetId: $assetId, fromEmployeeId: $fromEmployeeId, toEmployeeId: $toEmployeeId, reason: $reason, conditionNoted: $conditionNoted) {
    id
    assetId
    fromEmployeeId
    toEmployeeId
    reason
    transferredAt
  }
}

mutation CreateMaintenanceTicket($assetId: ID!, $reporterId: ID!, $description: String!, $severity: String!, $vendorId: ID, $repairCost: Int) {
  createMaintenanceTicket(assetId: $assetId, reporterId: $reporterId, description: $description, severity: $severity, vendorId: $vendorId, repairCost: $repairCost) {
    id
    assetId
    description
    status
    severity
  }
}

mutation RequestDisposal($assetId: ID!, $requestedBy: ID!, $method: String!, $reason: String) {
  requestDisposal(assetId: $assetId, requestedBy: $requestedBy, method: $method, reason: $reason) {
    id
    status
    assetId
  }
}

mutation ApproveDisposal($id: ID!, $approvedBy: ID!, $stage: String!) {
  approveDisposal(id: $id, approvedBy: $approvedBy, stage: $stage) {
    id
    status
  }
}

mutation RejectDisposal($id: ID!, $rejectedBy: ID!, $reason: String) {
  rejectDisposal(id: $id, rejectedBy: $rejectedBy, reason: $reason) {
    id
    status
  }
}
