# Employee Offboarding Workflows

# Queries
query GetOffboardingEvent($employeeId: ID!) {
  offboardingEvent(employeeId: $employeeId) {
    id
    status
    totalAssets
    returnedAssets
    assetIdsJson
    deadline
    completedAt
    createdAt
    employee {
      id
      firstName
      lastName
      email
    }
    initiatedBy {
      id
      firstName
      lastName
    }
    assetsToReturn {
      id
      assetTag
      serialNumber
    }
  }
}

# Mutations
mutation StartOffboarding($employeeId: ID!, $initiatedBy: ID!, $terminationDate: Float) {
  startOffboarding(employeeId: $employeeId, initiatedBy: $initiatedBy, terminationDate: $terminationDate) {
    id
    status
  }
}

mutation SubmitReturnRequest($assetId: ID!, $employeeId: ID!, $condition: String!, $conditionDetail: String, $photoR2Key: String) {
  submitReturnRequest(assetId: $assetId, employeeId: $employeeId, condition: $condition, conditionDetail: $conditionDetail, photoR2Key: $photoR2Key) {
    id
    assetId
    status
    conditionEmployee
  }
}

mutation CompleteAssetReturn($assetId: ID!, $employeeId: ID!, $condition: String!, $inspectedBy: ID!) {
  completeAssetReturn(assetId: $assetId, employeeId: $employeeId, condition: $condition, inspectedBy: $inspectedBy) {
    id
    assetTag
    status
  }
}

mutation ApproveReturnRequest($returnRequestId: ID!, $conditionHr: String!, $inspectedBy: ID!) {
  approveReturnRequest(returnRequestId: $returnRequestId, conditionHr: $conditionHr, inspectedBy: $inspectedBy) {
    id
    assetTag
    status
  }
}

mutation RequestRepair($returnRequestId: ID!, $conditionHr: String!, $photoR2Key: String, $inspectedBy: ID!) {
  requestRepair(returnRequestId: $returnRequestId, conditionHr: $conditionHr, photoR2Key: $photoR2Key, inspectedBy: $inspectedBy) {
    id
    assetTag
    status
  }
}
